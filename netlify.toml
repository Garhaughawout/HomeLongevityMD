[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # NEXT_PUBLIC_* values are inlined into the client bundle by design, and the
  # Supabase anon key is public by design (access is enforced by RLS). Tell
  # Netlify's secret scanner these are intentional, not leaks.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"

[[plugins]]
  package = "@netlify/plugin-nextjs"
